# Weekly refresh of live retailer prices for the products on a direct affiliate
# program (Sports Research via Rakuten). Mechanical + network-heavy, no judgment,
# so it lives in Actions rather than a claude.ai Routine — same rationale as
# kpi-digest.yml.
#
# Two jobs in one:
#   1. Price freshness. The buy box shows the store's price before the click;
#      a stale price is a broken promise to the reader.
#   2. SKU drift alarm. The /go/ router pins a specific Shopify variant. If
#      Sports Research retires one, sync-sr-prices.mjs exits non-zero and this
#      workflow fails loudly — instead of the money link quietly degrading and
#      us hearing about it from a reader.
#
# A price change commits itself and Netlify redeploys. A dead variant needs a
# human to repoint the murl in src/data/affiliate-links.json.
#
# Optional repo secrets (the alert step is skipped when unset):
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID   same bot as kpi-digest
name: price-sync

on:
  schedule:
    - cron: '30 1 * * 1' # Monday 01:30 UTC = 09:30 HKT, just after the KPI digest
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh prices from the retailer
        id: sync
        working-directory: mindfulroots
        run: npm run sync:prices 2>&1 | tee /tmp/price-sync.log

      - name: Commit any price change
        if: success()
        run: |
          if git diff --quiet -- mindfulroots/src/data/product-prices.json; then
            echo "Prices unchanged."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mindfulroots/src/data/product-prices.json
          git commit -m "chore(prices): weekly retailer price refresh"
          git push

      # Only fires when sync-sr-prices.mjs exits non-zero — a retired variant or
      # an out-of-stock pick. Both mean a money link needs a human.
      - name: Alert on SKU drift
        if: failure() && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          BODY=$(tail -c 3000 /tmp/price-sync.log)
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=⚠️ price-sync failed — an affiliate SKU has drifted. Repoint the murl in src/data/affiliate-links.json.

${BODY}"
