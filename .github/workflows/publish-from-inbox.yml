name: Publish MindfulRoots post from inbox

# Cowork drafts a post and drops it into content-inbox/.
# This Action does the GitHub side: move the draft into the blog folder,
# pop the matching topic off the queue, and commit. Netlify deploys on push.

on:
  push:
    branches: [main]
    paths:
      - "content-inbox/**"   # publish as soon as a draft is pushed
  schedule:
    - cron: "30 13 * * *"   # 13:30 UTC daily — safety net
  workflow_dispatch: {}      # allow manual runs from the Actions tab

# Same-repo commits only need the built-in token. No PAT required.
permissions:
  contents: write

concurrency:
  group: mindfulroots-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process inbox and pop queue
        env:
          INBOX_DIR: content-inbox
          BLOG_DIR: mindfulroots/src/content/blog
          QUEUE_FILE: mindfulroots-topic-queue.txt
        run: |
          python3 - <<'PY'
          import os, re, glob, sys

          inbox = os.environ["INBOX_DIR"]
          blog  = os.environ["BLOG_DIR"]
          queue = os.environ["QUEUE_FILE"]

          drafts = sorted(glob.glob(os.path.join(inbox, "*.md")))
          if not drafts:
              print("No drafts in inbox. Nothing to publish.")
              sys.exit(0)

          os.makedirs(blog, exist_ok=True)

          if os.path.exists(queue):
              with open(queue) as f:
                  qlines = [l for l in f.read().splitlines() if l.strip()]
          else:
              qlines = []

          published = []
          for draft in drafts:
              slug = os.path.splitext(os.path.basename(draft))[0]
              with open(draft) as f:
                  text = f.read()
              m = re.search(r'^slug:\s*"?([^"\n]+)"?', text, re.MULTILINE)
              if m:
                  slug = m.group(1).strip()

              dest = os.path.join(blog, f"{slug}.md")
              with open(dest, "w") as f:
                  f.write(text)
              os.remove(draft)

              before = len(qlines)
              qlines = [l for l in qlines
                        if not re.search(rf'(^|\|)\s*SLUG:\s*{re.escape(slug)}\s*(\||$)', l)]
              popped = before - len(qlines)
              published.append((slug, popped))
              print(f"Published {slug}.md (queue entries removed: {popped})")

          with open(queue, "w") as f:
              f.write("\n".join(qlines) + ("\n" if qlines else ""))

          if not qlines:
              print("WARNING: topic queue is now empty — add more topics.")

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write("changed=true\n")
          PY
        id: process

      - name: Commit and push
        if: steps.process.outputs.changed == 'true'
        run: |
          git config user.name  "mindfulroots-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "content: publish from inbox ($(date -u +%Y-%m-%d))"
          git push
