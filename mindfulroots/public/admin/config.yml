# ─── Sveltia CMS configuration ──────────────────────────────────────────────
# Sveltia CMS (the modern, actively-maintained successor to Decap/Netlify CMS)
# talks to GitHub directly — no Netlify Identity / Git Gateway needed.
#
# Set "repo" below to YOUR repo, e.g. "ec-twf/mindfulroots".
#
# LOGIN: open https://your-site.netlify.app/admin/ and click "Sign In with Token".
# Generate a GitHub Personal Access Token (classic) with the "repo" scope at
# https://github.com/settings/tokens, paste it in, and you're in. This is the
# simplest option for a solo owner/small team — no extra setup required.
#
# (Only if you later want non-technical collaborators to log in with their own
# email/password instead of a GitHub token, set up the free Sveltia CMS
# Authenticator on Cloudflare Workers — https://github.com/sveltia/sveltia-cms-auth
# — and add `base_url: https://your-worker.workers.dev` below.)
backend:
  name: github
  repo: ec-twf/mindfulroots
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "blog"
    label: "Blog posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description (SEO)", name: "description", widget: "text" }
      - { label: "Publish date", name: "pubDate", widget: "datetime" }
      - { label: "Updated date", name: "updatedDate", widget: "datetime", required: false }
      - label: "Topic cluster"
        name: "cluster"
        widget: "select"
        options:
          - "Omega-3 & brain health"
          - "Vitamin D & mood"
          - "Magnesium & stress/sleep"
          - "B vitamins & energy"
          - "Adaptogens"
          - "L-theanine & calm focus"
          - "Saffron & mood research"
          - "5-HTP & serotonin"
          - "Gut–brain axis"
          - "Lifestyle & foundations"
      - label: "Related products (slugs)"
        name: "relatedProducts"
        widget: "select"
        multiple: true
        required: false
        options:
          - "omega-3-fish-oil"
          - "vitamin-d3"
          - "magnesium-glycinate"
          - "b-complex"
          - "ashwagandha"
          - "l-theanine"
          - "saffron-extract"
          - "rhodiola-rosea"
          - "5-htp"
          - "probiotic-gut-brain"
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "products"
    label: "Supplements"
    folder: "src/content/products"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Latin / scientific name", name: "latinName", widget: "string", required: false }
      - { label: "Category", name: "category", widget: "string" }
      - { label: "Evidence tier", name: "evidence", widget: "select", options: ["Emerging", "Moderate", "Well-studied"] }
      - { label: "Short description", name: "shortDescription", widget: "text" }
      - { label: "Benefits", name: "benefits", widget: "list", field: { label: "Benefit", name: "benefit", widget: "string" } }
      - { label: "Typical use", name: "typicalUse", widget: "text" }
      - { label: "Cautions", name: "cautions", widget: "text" }
      - { label: "Interaction warning (optional, shown in red box)", name: "interactionWarning", widget: "text", required: false }
      - { label: "iHerb keyword or URL", name: "iherbKeyword", widget: "string" }
      - { label: "Related post slugs", name: "relatedPosts", widget: "list", required: false, field: { label: "Post slug", name: "slug", widget: "string" } }
      - { label: "Sort order", name: "order", widget: "number", default: 99 }
      - { label: "Body", name: "body", widget: "markdown" }
