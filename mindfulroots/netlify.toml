# Added for the Threads approval webhook function. Only declares the functions
# directory + bundler — build command / publish dir stay configured in the Netlify dashboard.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build]
  # Skip the deploy when a push only touched data/, scripts/ or .github/ — the
  # weekly GSC report commits CSVs that change nothing the site renders.
  ignore = "bash ../scripts/netlify-should-build.sh"
